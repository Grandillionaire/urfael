# Build signed/packaged Urfael installers on every tag (and manually).
#
# WHAT YOU GET WITHOUT ANY SECRETS: an unsigned macOS .dmg/.zip, a Linux .AppImage, and a Windows .exe (nsis)
# as workflow artifacts. They run fine for you and CI-savvy users; consumers will see an OS "unidentified
# developer" warning until you add signing.
#
# TO SIGN/NOTARIZE (consumer-grade, no warnings), add these repo secrets (electron-builder reads them):
#   macOS:   CSC_LINK (base64 of your .p12 Developer ID cert), CSC_KEY_PASSWORD,
#            APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID   (for notarization)
#   Windows: WIN_CSC_LINK (base64 of your code-signing .pfx), WIN_CSC_KEY_PASSWORD
# Linux AppImage needs no signing. Nothing here runs until you push a tag, so it costs nothing to merge.
name: build
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write   # needed to publish installers to a GitHub Release on tag

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        # macOS Apple Silicon (macos-latest) + Linux + native Windows (NSIS). Intel macOS (macos-13) is
        # omitted for now: the hosted Intel runners queued indefinitely here and blocked the whole release.
        # Windows used to be WSL-only because the daemon's boundary was a 0600 unix-domain socket; the native
        # port replaced that boundary on win32 with a per-user named pipe + a required, ACL-protected token
        # (see app/ipc.js), so a native build no longer weakens the model. The .exe ships unsigned until a
        # Windows code-signing cert exists (SmartScreen will warn); WSL remains fully supported.
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci || npm install
      - run: npm test
      # Gate a release on the SAME credential-free harnesses as ci.yml (see ci.yml). A change that passes
      # unit tests but breaks input-fuzz or the SSRF red-team must NOT be packageable into a tagged release.
      # The live-daemon security benchmark (`npm run security`) is intentionally absent: it boots a real
      # daemon on a `claude` login and spends real turns, so it stays on the manual release checklist.
      - name: fuzz the input boundaries (small budget for CI)
        run: npm run fuzz
        env:
          FUZZ_ITERS: '6000'
      - name: SSRF red-team (differential, loopback)
        run: npm run redteam
      - name: Build installer
        # --publish never: only BUILD here. With GH_TOKEN present, electron-builder would otherwise try to
        # auto-publish on a tag, which collides with the explicit release step below and fails the build.
        run: npm run dist -- --publish never
        env:
          # Unsigned build. CSC_IDENTITY_AUTO_DISCOVERY=false stops macOS from probing the keychain.
          # The signing secrets are intentionally NOT passed here: an UNSET secret expands to an empty
          # string, and an empty CSC_LINK makes electron-builder enter the signing path and fail with
          # "app not a file". To sign later, add the certs as repo secrets and reintroduce CSC_LINK /
          # CSC_KEY_PASSWORD / APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID (only when non-empty),
          # and drop CSC_IDENTITY_AUTO_DISCOVERY.
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: urfael-${{ matrix.os }}
          path: |
            app/dist/*.dmg
            app/dist/*.zip
            app/dist/*.AppImage
            app/dist/*.exe
          if-no-files-found: ignore
      # On a tag push, attach the installers to the GitHub Release so urfael.com's download buttons resolve.
      - name: Publish installers to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/dist/*.dmg
            app/dist/*.zip
            app/dist/*.AppImage
            app/dist/*.exe
          fail_on_unmatched_files: false
          generate_release_notes: true
