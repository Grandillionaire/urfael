name: ci

# The credential-free gate. Runs on every push + PR across an OS/node matrix so the unit suite, the input-fuzz
# harness, and the SSRF red-team actually GATE changes (build.yml only fires on release tags). The live-daemon
# harnesses — `npm run security` and `npm run e2e` — are deliberately NOT here: they boot a real daemon on your
# `claude` login and spend real turns, so they stay local/manual.
on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    name: test · ${{ matrix.os }} · node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # windows-latest is a FIRST-CLASS leg: the native port (named-pipe + token boundary, claude-bin
        # resolver, goal-loop twin) regresses here first, and no one on the team runs Windows hardware.
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22, 24]
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: install
        run: npm ci || npm install
      - name: unit tests (pure, no credentials)
        run: npm test
      - name: fuzz the input boundaries (small budget for CI)
        run: npm run fuzz
        env:
          FUZZ_ITERS: '6000'
      - name: SSRF red-team (differential, loopback)
        run: npm run redteam
      # The Windows installer EXECUTES on every push (downloads skipped): vault scaffold + junction, config
      # templates, the urfael shim + PATH append, autostart helpers — then the installed CLI must answer.
      # Parse-checking alone would miss runtime breakage; nobody on the team runs Windows hardware.
      - name: install.ps1 smoke (Windows; no big downloads)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: ${{ github.workspace }}
        env:
          URFAEL_INSTALL_SKIP_DOWNLOADS: '1'
        run: |
          powershell -ExecutionPolicy Bypass -File .\install.ps1
          if ($LASTEXITCODE -ne 0) { throw "install.ps1 exited $LASTEXITCODE" }
          if (-not (Test-Path "$HOME\Urfael\CLAUDE.md")) { throw 'vault not scaffolded' }
          if (-not (Test-Path "$HOME\Urfael\.claude")) { throw '.claude junction missing' }
          if (-not (Test-Path "$HOME\Urfael\_urfael\goal-loop.js")) { throw 'goal-loop twin missing from vault' }
          if (-not (Test-Path "$env:LOCALAPPDATA\Urfael\bin\urfael.cmd")) { throw 'urfael shim missing' }
          node app\cli.js version
          if ($LASTEXITCODE -ne 0) { throw 'installed CLI failed to answer' }
